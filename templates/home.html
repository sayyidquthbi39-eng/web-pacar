<!DOCTYPE html>
<html>
<head>
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffb6c1);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        h1 {
            color: white;
            margin-top: 50px;
            font-size: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: fadeIn 2s ease-in-out;
        }

        p {
            color: white;
            font-size: 18px;
            margin-bottom: 20px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        img {
            width: 160px;
            margin: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            background: #ff2e55;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .heart {
            position: fixed;
            top: -10px;
            color: white;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

    <h1>Untuk Kamu yang Aku Sayang ❤️</h1>
    <p>Kamu bukan cuma spesial... kamu adalah rumah untuk hatiku 💕</p>

    <!-- FOTO -->
    <img src="{{ url_for('static', filename='foto1.jpg') }}">
    <img src="{{ url_for('static', filename='foto2.jpg') }}">
    <img src="{{ url_for('static', filename='foto3.jpg') }}">
    <img src="{{ url_for('static', filename='foto4.jpg') }}">
    <img src="{{ url_for('static', filename='foto5.jpg') }}">

    <!-- MUSIK -->
    <audio id="lagu" loop>
        <source src="{{ url_for('static', filename='lagu.mp3') }}" type="audio/mpeg">
    </audio>

    <br>

    <p>💖 sentuh layar atau klik tombol untuk nyalakan musik</p>

    <button onclick="document.getElementById('lagu').play()">
        Putar Musik 🎵
    </button>

    <!-- TAP AUTOPLAY FIX -->
    <script>
        document.addEventListener("click", function () {
            document.getElementById("lagu").play();
        }, { once: true });
    </script>

    <!-- LOVE ANIMATION -->
    <script>
        setInterval(() => {
            let love = document.createElement("div");
            love.innerHTML = "❤️";
            love.classList.add("heart");
            love.style.left = Math.random() * 100 + "vw";
            love.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(love);

            setTimeout(() => {
                love.remove();
            }, 5000);
        }, 300);
    </script>

</body>
</html>
