<!DOCTYPE html>
<html>
<head>
    <title>Untuk Kamu ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffb6c1);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
            text-align: center;
            overflow-x: hidden;
            color: white;
        }

        @keyframes bg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card {
            margin: 40px auto;
            width: 85%;
            max-width: 650px;
            background: rgba(255,255,255,0.15);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 38px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        p {
            font-size: 18px;
        }

        .photos img {
            width: 140px;
            margin: 10px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .photos img:hover {
            transform: scale(1.1);
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #ff2e55;
        }

        .section {
            margin-top: 40px;
            padding: 20px;
        }

        .love {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall linear;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        .footer {
            margin-top: 60px;
            opacity: 0.8;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- CARD UTAMA -->
    <div class="card">
        <h1>Hai Kamu ❤️</h1>
        <p>semanagat jalani harinya ya  💕</p>

        <button onclick="document.getElementById('lagu').play()">
            Putar Musik 🎵
        </button>
    </div>

    <!-- FOTO -->
    <div class="photos">
        <img src="{{ url_for('static', filename='foto1.jpg') }}">
        <img src="{{ url_for('static', filename='foto2.jpg') }}">
        <img src="{{ url_for('static', filename='foto3.jpg') }}">
        <img src="{{ url_for('static', filename='foto4.jpg') }}">
        <img src="{{ url_for('static', filename='foto5.jpg') }}">
    </div>

    <!-- MUSIK -->
    <audio id="lagu" loop>
        <source src="{{ url_for('static', filename='lagu.mp3') }}" type="audio/mpeg">
    </audio>

    <p>💖 yu pencet msusik nya</p>

    <script>
        document.addEventListener("click", function () {
            document.getElementById("lagu").play();
        }, { once: true });
    </script>

    <!-- SECTION CERITA -->
    <div class="section">
        <h2>💌 aboy</h2>
        <p>
            terima kasih ya uda nemenin aboy sampe
            sekarang💕
        </p>
    </div>

    <!-- QUOTE -->
    <div class="section">
        <h2>✨ for risa</h2>
        <p>
            semanagat ya sayang untuk jalani hari harinya  ❤️
        </p>
    </div>

    <!-- JANJI -->
    <div class="section">
        <h2>⏳ for risa</h2>
        <p>
           aboy akan selalu ada, hari ini, besok, dan seterusnya 💕
        </p>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        💖 untuk orang tersayang
    </div>

    <!-- ANIMASI LOVE -->
    <script>
        setInterval(() => {
            let love = document.createElement("div");
            love.innerHTML = "❤️";
            love.classList.add("love");
            love.style.left = Math.random() * 100 + "vw";
            love.style.animationDuration = (Math.random() * 3 + 2) + "s";
            document.body.appendChild(love);

            setTimeout(() => {
                love.remove();
            }, 5000);
        }, 300);
    </script>

</body>
</html>
