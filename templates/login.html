<!DOCTYPE html>
<html>
<head>
    <title>Login ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffdde1, #ee9ca7, #ffb6c1);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
        }

        @keyframes bg {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .box {
            background: rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            text-align: center;
            width: 300px;
        }

        h2 {
            color: white;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #ff4d6d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #ff2e55;
        }

        p {
            color: white;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Login dulu ya ❤️</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username"><br>
            <input type="password" name="password" placeholder="Password"><br>
            <button type="submit">Masuk 💕</button>
        </form>

        <p>💖 khusus untuk seseorang yang spesial</p>
    </div>

</body>
</html>
